name: CI

on:
  push:
    branches: [master, "feature/**", "fix/**", "chore/**", "agent/**"]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Tests, lint, types and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: compta_paramedicale_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d compta_paramedicale_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/compta_paramedicale_test
      JWT_SECRET: ci-secret-with-at-least-32-characters

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate database migrations and seed
        run: npm run db:migrate && npm run db:seed

      - name: Run tests
        run: npm test

      - name: Check types
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
